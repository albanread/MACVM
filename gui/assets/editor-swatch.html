<!-- editor-swatch.html — visual-verification page for the text-editor terminal
     (../../docs/editor_design.md M3), same posture as canvas-swatch.html:
     computer-use tools can't attach to the native `cargo run -p macvm-gui`
     app, so this exercises the real shipped `smtk.js` editor terminal against
     the real `editor_render.rs` markup through a local static server instead.

     Typing in the buffer posts {kind:"editorKey", key, at} through the real
     smtk.js (open devtools to see the posts; there is no VM here to answer).
     The "simulate blast" buttons stand in for main.rs's vm_bridge_drain,
     calling the real window.macvmEditorView(cursor, text) with the exact
     (cursor, whole-buffer) pairs EditorSession>>render produces — the VM owns
     the text and blasts it whole, so the JS just sets value + caret. -->
<meta charset="utf-8">
<script>
  const theme = new URLSearchParams(location.search).get('theme') || 'hidef.css';
  const link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = theme;
  document.head.appendChild(link);
</script>
<div class="st-page">
  <h1>Text Editor</h1>
  <p>Edit a class as text. <em>(Live editing — the VM owns the text.)</em></p>
  <div class="st-editor-toolbar">
    <input class="st-editor-class" type="text" value="Demo" autocomplete="off" spellcheck="false">
    <button type="button" class="st-editor-save" data-editor-action="save">Save</button>
  </div>
  <textarea class="st-editor-buffer" spellcheck="false" autocomplete="off"
            autocapitalize="off" wrap="off" data-class="Demo">hello
world</textarea>

  <div style="margin-top:12px; display:flex; gap:6px; flex-wrap:wrap">
    <button id="b-open">open (caret 0, "hello\nworld")</button>
    <button id="b-insert">insert X @caret3 -> "heXllo\nworld"</button>
    <button id="b-split">Enter @caret3 -> 3 lines</button>
    <button id="b-bksp">backspace merge -> 2 lines</button>
  </div>
  <pre id="note" style="margin-top:8px; opacity:.7"></pre>
</div>

<script src="smtk.js"></script>
<script>
  // (cursor 0-based, whole buffer) — exactly what EditorSession>>render answers.
  var BLASTS = {
    "b-open":   [0, "hello\nworld"],
    "b-insert": [3, "heXllo\nworld"],
    "b-split":  [4, "heX\nllo\nworld"],
    "b-bksp":   [3, "heXllo\nworld"],
  };
  Object.keys(BLASTS).forEach(function (id) {
    document.getElementById(id).addEventListener('click', function () {
      window.macvmEditorView.apply(null, BLASTS[id]);
      document.getElementById('note').textContent =
        'buffer := ' + JSON.stringify(BLASTS[id][1]) + '  caret := ' + BLASTS[id][0];
    });
  });
</script>
